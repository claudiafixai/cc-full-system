name: Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable auto-merge on development → main PRs
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.ref == 'development' && github.event.pull_request.base.ref == 'main'
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge "$PR" \
            --repo "$REPO" \
            --merge \
            --auto \
            --subject "Merge development into main" || true
